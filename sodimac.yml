    EventCorp:
      type: object
      required:
        - eventId
        - timestamp
        - datetime
        - version
        - country
        - commerce
        - domain
        - capability
        - mimetype
      properties:
        eventId:
          examples:
            - 05a1c531-6733-4b98-8410-9dbb3ea416f6
          type: string
          description: Event identification. Alphanumeric string formatted as UUID
          format: uuid
        timestamp:
          type: string
          minimum: 1112641071
          examples:
            - 1669049576
          description: Unix epoch indicating event occurrence
        datetime:
          type: string
          format: date-time
          examples:
            - '2018-05-15T14:51:12.402+00:00'
          description: Human readable date/time indicating event occurrence
        version:
          type: string
          examples:
            - '1.0'
          enum:
            - '1.0'
          description: Event version
        country:
          type: string
          pattern: ([A-Z])
          maxLength: 2
          minLength: 2
          examples:
            - CL
            - PE
            - CO
          description: >-
            Physical location of the business that originated the
            event.ISO3166-1 alpha-2 formatted country name
        commerce:
          type: string
          examples:
            - SOD
          description: Name of commerce as it is known
          enum:
            - FAL
            - SOD
            - IKS
            - TOT
        domain:
          type: string
          enum:
            - mrch
          examples:
            - mrch
          description: Business domain according the capability map
        capability:
          type: string
          examples:
            - prch
          description: Domain capability according the capability map
          enum:
            - prch
        mimeType:
          type: string
          enum:
            - application/json
          examples:
            - application/json
          description: Used to indicate the mime type of the event
