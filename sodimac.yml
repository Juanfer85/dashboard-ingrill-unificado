                    example: Master
                  grossWeight:
                    description: Gross weight of the logitic dimension.
                    type: number
                    multipleOf: 0.001
                    example: 7.052
                  netWeight:
                    description: Net weight of the logistic dimension.
                    type: number
                    multipleOf: 0.001
                    example: 25.363
